name: ci

on:
  push:


jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    
    steps:
    - uses: actions/checkout@v4
    - name: Checkout Repo
      uses: actions/setup-python@v3

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv
        uv sync

    - name: Test with pytest
      run: |
        basedpyright