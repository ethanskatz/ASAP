[project]
name = "asap"
version = "0.1.0"
description = ""
authors = [
    {name = "Ethan Katz"}
]
license = {text = "Apache"}
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "zaber-motion (>=8.4.0,<9.0.0)"
]

[dependency-groups]
dev = [
    "pytest (>=9.0.2,<10.0.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"


[tool.poetry]
package-mode = false

[tool.ruff]
line-length = 79
target-version = "py310"
lint.select = ["ALL"]
lint.ignore = ["E501"]  # Black handles line length
src = ["backend"]

[tool.ruff.isort]
known-first-party = ["backend"]
